# Attaches KubeVirt VMs to the physical LAN (192.168.1.0/24) via OVN localnet.
# Uses the existing OVS bridge-mapping "physnet:br-ex" on SNO (enp0s31f6).
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: satellite-provisioning
  namespace: satellite-vms
  labels:
    app.kubernetes.io/managed-by: satellite-kubevirt
spec:
  config: |
    {
      "cniVersion": "0.4.0",
      "name": "satellite-provisioning",
      "type": "ovn-k8s-cni-overlay",
      "topology": "localnet",
      "netAttachDefName": "satellite-vms/satellite-provisioning",
      "physicalNetworkName": "physnet",
      "mtu": 1500,
      "ipam": {}
    }
